services:
  - type: web
    name: newclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: NEWCLAW_STATE_DIR
        value: /data/.newclaw
      - key: NEWCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: NEWCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: newclaw-data
      mountPath: /data
      sizeGB: 1
