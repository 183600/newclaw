services:
  - type: web
    name: iflow
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: CLAW_STATE_DIR
        value: /data/.iflow
      - key: CLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: CLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: iflow-data
      mountPath: /data
      sizeGB: 1
