services:
  iflow-gateway:
    image: ${CLAW_IMAGE:-iflow:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      CLAW_GATEWAY_TOKEN: ${CLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${CLAW_CONFIG_DIR}:/home/node/.iflow
      - ${CLAW_WORKSPACE_DIR}:/home/node/.iflow/workspace
    ports:
      - "${CLAW_GATEWAY_PORT:-18789}:18789"
      - "${CLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      ["node", "dist/index.js", "gateway", "--bind", "${CLAW_GATEWAY_BIND:-lan}", "--port", "18789"]

  iflow-cli:
    image: ${CLAW_IMAGE:-iflow:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      CLAW_GATEWAY_TOKEN: ${CLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${CLAW_CONFIG_DIR}:/home/node/.iflow
      - ${CLAW_WORKSPACE_DIR}:/home/node/.iflow/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
