name: claw-ts-autoloop

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: claw-autoflow-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-ts-5h:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      RUN_HOURS: 5
      WORK_BRANCH: main

      RELEASE_MARKER_FILE: .git/claw_release_tag

      CLAW_API_KEY: ${{ secrets.CLAW_API_KEY }}
      CLAW_BASE_URL: https://maas-api.cn-huabei-1.xf-yun.com/v2
      CLAW_MODEL_NAME: xopkimik25

      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # 修改点：使用内置 token，无需配置额外的 Secret，解决 "Input required" 报错
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Ensure branch and git identity
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${WORK_BRANCH:-main}"
          git fetch origin "${BRANCH}" --prune
          git checkout -B "${BRANCH}" "origin/${BRANCH}"
          git config user.name "claw-bot"
          git config user.email "claw-bot@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # ⬆ removed cache / cache-dependency-path to avoid
          #   "Path Validation Error … no cache is being saved"

      - name: Enable Corepack (pnpm)
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm --version

      - name: Install Claw CLI
        shell: bash
        run: |
          set -euo pipefail
          pnpm add -g @claw-ai/claw-cli@latest
          claw --version

      - name: Verify CLAW_API_KEY
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLAW_API_KEY:-}" || { echo "Missing CLAW_API_KEY secret"; exit 1; }

      - name: Install Project Dependencies (pnpm)
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Make loop script executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ts_loop.sh

      - name: Run for ${{ env.RUN_HOURS }} hours
        shell: bash
        run: |
          set -euo pipefail
          timeout --signal=TERM $(( RUN_HOURS * 3600 )) bash scripts/ts_loop.sh || true

      - name: Commit & push to GitHub
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${WORK_BRANCH:-main}"

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "ci: ${RUN_HOURS}h batch update (run $GITHUB_RUN_ID)" || true
          fi

          MARKER_FILE="${RELEASE_MARKER_FILE}"
          if [[ ! -f "${MARKER_FILE}" ]]; then
            GIT_DIR_REAL="$(git rev-parse --git-dir 2>/dev/null || echo ".git")"
            MARKER_FILE="${GIT_DIR_REAL%/}/claw_release_tag"
          fi
          if [[ -f "${MARKER_FILE}" ]]; then
            echo "Release tag prepared: $(cat "${MARKER_FILE}")"
          fi

          git push origin "HEAD:${BRANCH}" --follow-tags --force